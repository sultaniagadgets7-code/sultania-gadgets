<svg width="220" height="60" viewBox="0 0 220 60" xmlns="http://www.w3.org/2000/svg">
  <!-- S-shaped lightning bolt -->
  <g transform="translate(4, 4)">
    <!-- Top bolt -->
    <path d="M28 0 L10 26 L22 26 L8 52 L42 20 L28 20 L40 0 Z" fill="url(#redGrad)" />
    <!-- Gradient -->
    <defs>
      <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#cc0000;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#8b0000;stop-opacity:1" />
      </linearGradient>
    </defs>
  </g>

  <!-- SULTANIA text -->
  <text x="62" y="34" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#1a1a1a" letter-spacing="0.5">SULTANIA</text>

  <!-- GADGETS text -->
  <text x="64" y="50" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#cc0000" letter-spacing="3">GADGETS</text>
</svg>
